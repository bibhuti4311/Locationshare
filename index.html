<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LocationShare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1976D2;min-height:100vh}
#app{display:none;background:#f5f5f5;min-height:100vh}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px}
h1{color:#fff;font-size:24px;margin-bottom:4px;text-align:center}
.sub{color:#fff9;font-size:13px;margin-bottom:20px;text-align:center}
h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;margin-bottom:5px;margin-top:10px}
input[type=text],input[type=email],input[type=password]{width:100%;padding:13px;font-size:15px;border:2px solid #ddd;border-radius:10px;display:block}
.err{background:#ffebee;color:#c62828;padding:10px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.btn{width:100%;background:#1976D2;color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;margin-top:14px;cursor:pointer}
.link{width:100%;background:#EEF2FF;color:#1976D2;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;margin-top:8px;cursor:pointer}
.logo{font-size:44px;margin-bottom:6px;text-align:center}

/* APP SCREENS */
#app header{background:#1976D2;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
#app header h1{font-size:17px;font-weight:700;flex:1}
.tabs{display:flex;background:#fff;border-top:1px solid #ddd;position:fixed;bottom:0;left:0;right:0}
.tab{flex:1;padding:10px 5px;border:none;background:none;font-size:10px;font-weight:600;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab.active{color:#1976D2}
.tab span{font-size:20px}
.screen{display:none;padding:14px;padding-bottom:80px;min-height:calc(100vh - 56px);overflow-y:auto}
.screen.active{display:block}
.group-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px #0001;cursor:pointer}
.avatar{width:46px;height:46px;border-radius:50%;background:#1976D2;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.fab{position:fixed;bottom:70px;right:16px;width:52px;height:52px;border-radius:50%;background:#1976D2;color:#fff;border:none;font-size:26px;box-shadow:0 3px 10px #0003;cursor:pointer}
.msg{padding:6px 12px;border-radius:16px;max-width:75%;font-size:14px;margin:3px 0;word-break:break-word}
.msg.mine{background:#DCF8C6;margin-left:auto}
.msg.other{background:#fff;box-shadow:0 1px 2px #0001}
.msg-name{font-size:10px;color:#1976D2;font-weight:700;margin-bottom:2px}
.msg-time{font-size:9px;color:#999;margin-top:2px;text-align:right}
#chat-box{display:flex;flex-direction:column;gap:4px;padding:10px;padding-bottom:80px;min-height:calc(100vh - 120px)}
#chat-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;padding:8px;display:flex;gap:8px;border-top:1px solid #ddd}
#chat-input{flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:15px;outline:none}
#chat-send{background:#1976D2;color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login">
  <div class="logo">📡</div>
  <h1>LocationShare</h1>
  <div class="sub">Family location & group chat</div>
  <div class="card">
    <h2 id="form-title">Sign In</h2>
    <div id="name-row" style="display:none">
      <label>Name</label>
      <input type="text" id="inp-name" placeholder="Your full name">
    </div>
    <label>Email</label>
    <input type="email" id="inp-email" placeholder="you@gmail.com">
    <label>Password</label>
    <input type="password" id="inp-pass" placeholder="Password">
    <div class="err" id="err-msg"></div>
    <input type="button" class="btn" id="form-btn" value="Sign In">
    <input type="button" class="link" id="toggle-btn" value="No account? Register">
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <header>
    <h1 id="app-title">📡 LocationShare</h1>
    <button onclick="doSignOut()" style="background:none;border:none;color:#fff;font-size:13px;cursor:pointer">Sign Out</button>
  </header>

  <!-- GROUPS SCREEN -->
  <div class="screen active" id="screen-groups">
    <div id="groups-list"><p style="color:#999;text-align:center;padding:30px">Loading groups...</p></div>
    <button class="fab" onclick="createGroup()">+</button>
  </div>

  <!-- CHAT SCREEN -->
  <div class="screen" id="screen-chat" style="padding:0">
    <div id="chat-box"></div>
    <div id="chat-bar">
      <input type="text" id="chat-input" placeholder="Message...">
      <button id="chat-send" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <!-- MAP SCREEN -->
  <div class="screen" id="screen-map">
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px">🗺️</div>
      <h3 style="margin:12px 0 8px">Live Map</h3>
      <p style="color:#666;font-size:14px">Select a group to see member locations</p>
      <div id="map-members" style="margin-top:20px"></div>
    </div>
  </div>

  <!-- PROFILE SCREEN -->
  <div class="screen" id="screen-profile">
    <div style="text-align:center;padding:30px 20px">
      <div style="width:70px;height:70px;border-radius:50%;background:#1976D2;color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 12px" id="profile-avatar">U</div>
      <div style="font-size:18px;font-weight:700" id="profile-name">User</div>
      <div style="font-size:13px;color:#666;margin-top:4px" id="profile-email"></div>
    </div>
    <div style="background:#fff;margin:0 14px;border-radius:12px;overflow:hidden">
      <div style="padding:14px 16px;border-bottom:1px solid #eee;display:flex;justify-content:space-between;align-items:center">
        <span style="font-weight:600">📍 Location Sharing</span>
        <span id="loc-status" style="font-size:13px;color:#43A047">Active</span>
      </div>
      <div style="padding:14px 16px" onclick="showJoinGroup()">
        <span style="font-weight:600">🔑 Join Group by Code</span>
        <span style="float:right;color:#999">›</span>
      </div>
    </div>
    <button onclick="doSignOut()" style="display:block;margin:16px auto;background:#d32f2f;color:#fff;border:none;border-radius:10px;padding:14px 40px;font-size:15px;font-weight:700;cursor:pointer">Sign Out</button>
  </div>

  <!-- BOTTOM TABS -->
  <div class="tabs">
    <button class="tab active" onclick="showScreen('groups',this)"><span>👥</span>Groups</button>
    <button class="tab" onclick="showScreen('chat',this)"><span>💬</span>Chat</button>
    <button class="tab" onclick="showScreen('map',this)"><span>🗺️</span>Map</button>
    <button class="tab" onclick="showScreen('profile',this)"><span>👤</span>Profile</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:"AIzaSyDQUj7_pPJ5xanEFWfZbwwiDZt2gJY1E1E",
  authDomain:"locationshare-da6a6.firebaseapp.com",
  databaseURL:"https://locationshare-da6a6-default-rtdb.firebaseio.com",
  projectId:"locationshare-da6a6",
  storageBucket:"locationshare-da6a6.firebasestorage.app",
  messagingSenderId:"898254910234",
  appId:"1:898254910234:web:412b4aa466077018c4b2a3"
});

var auth=firebase.auth(), db=firebase.firestore(), rtdb=firebase.database();
var me=null, myGroups=[], curGroupId=null, msgUnsub=null;
var isReg=false;

// AUTH TOGGLE
document.getElementById('toggle-btn').onclick=function(){
  isReg=!isReg;
  document.getElementById('form-title').textContent=isReg?'Create Account':'Sign In';
  document.getElementById('form-btn').value=isReg?'Register':'Sign In';
  document.getElementById('toggle-btn').value=isReg?'Already registered? Sign In':'No account? Register';
  document.getElementById('name-row').style.display=isReg?'block':'none';
  document.getElementById('err-msg').style.display='none';
};

// SIGN IN / REGISTER
document.getElementById('form-btn').onclick=function(){
  var em=document.getElementById('inp-email').value.trim();
  var pw=document.getElementById('inp-pass').value.trim();
  var nm=document.getElementById('inp-name').value.trim();
  var err=document.getElementById('err-msg');
  err.style.display='none';
  if(!em||!pw){err.textContent='Enter email and password';err.style.display='block';return;}
  document.getElementById('form-btn').value='Please wait...';
  document.getElementById('form-btn').disabled=true;
  if(isReg){
    if(!nm){err.textContent='Enter your name';err.style.display='block';document.getElementById('form-btn').value='Register';document.getElementById('form-btn').disabled=false;return;}
    auth.createUserWithEmailAndPassword(em,pw)
      .then(function(c){
        return c.user.updateProfile({displayName:nm}).then(function(){
          db.collection('users').doc(c.user.uid).set({uid:c.user.uid,displayName:nm,email:em,createdAt:Date.now()}).catch(function(){});
        });
      })
      .catch(function(e){err.textContent=e.message;err.style.display='block';document.getElementById('form-btn').value='Register';document.getElementById('form-btn').disabled=false;});
  } else {
    auth.signInWithEmailAndPassword(em,pw)
      .catch(function(e){err.textContent=e.message;err.style.display='block';document.getElementById('form-btn').value='Sign In';document.getElementById('form-btn').disabled=false;});
  }
};

// AUTH STATE
auth.onAuthStateChanged(function(user){
  if(user){
    me=user;
    document.getElementById('login').style.display='none';
    document.getElementById('app').style.display='block';
    document.getElementById('profile-name').textContent=user.displayName||user.email;
    document.getElementById('profile-email').textContent=user.email;
    document.getElementById('profile-avatar').textContent=(user.displayName||'U').charAt(0).toUpperCase();
    loadGroups();
    startLocation();
  } else {
    document.getElementById('login').style.display='flex';
    document.getElementById('app').style.display='none';
  }
});

// SCREENS
function showScreen(name,btn){
  document.querySelectorAll('.screen').forEach(function(s){s.classList.remove('active');});
  document.getElementById('screen-'+name).classList.add('active');
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active');});
  if(btn) btn.classList.add('active');
  document.getElementById('app-title').textContent = name==='chat'&&curGroupId ? '💬 '+getCurGroupName() : '📡 LocationShare';
}

function getCurGroupName(){
  var g=myGroups.find(function(x){return x.id===curGroupId;});
  return g?g.name:'Chat';
}

// GROUPS
function loadGroups(){
  db.collection('groups').where('members','array-contains',me.uid)
    .onSnapshot(function(snap){
      myGroups=snap.docs.map(function(d){return Object.assign({id:d.id},d.data());});
      renderGroups();
    });
}

function renderGroups(){
  var list=document.getElementById('groups-list');
  if(myGroups.length===0){
    list.innerHTML='<p style="color:#999;text-align:center;padding:30px">No groups yet.<br>Tap + to create one!</p>';
    return;
  }
  list.innerHTML=myGroups.map(function(g){
    return '<div class="group-card" onclick="openChat(''+g.id+'',''+g.name+'')">'
      +'<div class="avatar">'+g.name.charAt(0).toUpperCase()+'</div>'
      +'<div><div style="font-weight:700;font-size:15px">'+g.name+'</div>'
      +'<div style="font-size:12px;color:#999;margin-top:2px">'+(g.lastMessage||'No messages yet')+'</div></div>'
      +'</div>';
  }).join('');
}

function createGroup(){
  var name=prompt('Group name (e.g. Family, Friends):');
  if(!name||!name.trim()) return;
  var code=Math.random().toString(36).substr(2,6).toUpperCase();
  db.collection('groups').add({
    name:name.trim(),
    createdBy:me.uid,
    members:[me.uid],
    admins:[me.uid],
    inviteCode:code,
    lastMessage:'',
    lastMessageTime:Date.now(),
    createdAt:Date.now()
  }).then(function(){alert('Group created! Invite code: '+code);});
}

function showJoinGroup(){
  var code=prompt('Enter 6-character invite code:');
  if(!code) return;
  db.collection('groups').where('inviteCode','==',code.toUpperCase()).get()
    .then(function(snap){
      if(snap.empty){alert('No group found with that code');return;}
      var ref=snap.docs[0].ref;
      ref.update({members:firebase.firestore.FieldValue.arrayUnion(me.uid)})
        .then(function(){alert('Joined group!');});
    });
}

// CHAT
function openChat(groupId, groupName){
  curGroupId=groupId;
  document.getElementById('app-title').textContent='💬 '+groupName;
  showScreen('chat', document.querySelector('.tab:nth-child(2)'));
  document.getElementById('chat-box').innerHTML='<p style="text-align:center;color:#999;padding:20px;font-size:13px">Loading messages...</p>';
  if(msgUnsub) msgUnsub();
  msgUnsub=db.collection('groups').doc(groupId).collection('messages')
    .orderBy('timestamp','asc').limit(100)
    .onSnapshot(function(snap){
      var box=document.getElementById('chat-box');
      box.innerHTML=snap.docs.map(function(d){
        var m=d.data();
        var mine=m.senderId===me.uid;
        return '<div style="display:flex;flex-direction:column;align-items:'+(mine?'flex-end':'flex-start')+';margin:3px 10px">'
          +(!mine?'<div class="msg-name">'+m.senderName+'</div>':'')
          +'<div class="msg '+(mine?'mine':'other')+'">'+m.content+'<div class="msg-time">'+new Date(m.timestamp).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+'</div></div>'
          +'</div>';
      }).join('');
      box.scrollTop=box.scrollHeight;
    });
}

function sendMsg(){
  var txt=document.getElementById('chat-input').value.trim();
  if(!txt||!curGroupId) return;
  document.getElementById('chat-input').value='';
  var msg={senderId:me.uid,senderName:me.displayName||me.email,content:txt,timestamp:Date.now()};
  db.collection('groups').doc(curGroupId).collection('messages').add(msg);
  db.collection('groups').doc(curGroupId).update({lastMessage:txt,lastMessageTime:Date.now()});
}

document.getElementById('chat-input').addEventListener('keydown',function(e){
  if(e.key==='Enter'){sendMsg();}
});

// LOCATION
function startLocation(){
  if(!navigator.geolocation) return;
  navigator.geolocation.watchPosition(function(pos){
    rtdb.ref('locations/'+me.uid).set({
      uid:me.uid,
      displayName:me.displayName||me.email,
      lat:pos.coords.latitude,
      lng:pos.coords.longitude,
      timestamp:Date.now(),
      sharing:true
    });
  },{enableHighAccuracy:true,maximumAge:5000});
}

// SIGN OUT
function doSignOut(){
  if(confirm('Sign out?')) auth.signOut();
}
</script>
</body>
</html>
