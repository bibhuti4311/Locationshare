<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LocationShare</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:sans-serif;background:#1976D2;min-height:100vh}
#app{display:none;background:#f5f5f5;min-height:100vh}
.login{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:380px}
h1{color:#fff;font-size:24px;margin-bottom:4px;text-align:center}
.sub{color:#fff9;font-size:13px;margin-bottom:20px;text-align:center}
h2{font-size:18px;font-weight:700;text-align:center;margin-bottom:16px}
label{display:block;font-size:11px;font-weight:700;color:#666;text-transform:uppercase;margin-bottom:5px;margin-top:10px}
input{width:100%;padding:13px;font-size:15px;border:2px solid #ddd;border-radius:10px;display:block;outline:none}
input:focus{border-color:#1976D2}
.err{background:#ffebee;color:#c62828;padding:10px;border-radius:8px;font-size:13px;margin-top:10px;display:none}
.info{background:#e3f2fd;color:#1565C0;padding:10px;border-radius:8px;font-size:13px;margin-top:10px;text-align:center}
.btn{width:100%;background:#1976D2;color:#fff;border:none;border-radius:10px;padding:15px;font-size:16px;font-weight:700;margin-top:14px;cursor:pointer;display:block;-webkit-appearance:none}
.link{width:100%;background:#EEF2FF;color:#1976D2;border:none;border-radius:10px;padding:14px;font-size:14px;font-weight:700;margin-top:8px;cursor:pointer;display:block;-webkit-appearance:none}
#app header{background:#1976D2;color:#fff;padding:14px 16px;display:flex;align-items:center;gap:10px}
#app header h1{font-size:17px;font-weight:700;flex:1;color:#fff}
.tabs{display:flex;background:#fff;border-top:1px solid #ddd;position:fixed;bottom:0;left:0;right:0;z-index:99}
.tab{flex:1;padding:10px 5px;border:none;background:none;font-size:10px;font-weight:600;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px}
.tab.active{color:#1976D2}
.tab span{font-size:20px}
.screen{display:none;padding:14px;padding-bottom:80px;min-height:calc(100vh - 56px);overflow-y:auto}
.screen.active{display:block}
.group-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 3px #0001;cursor:pointer}
.avatar{width:46px;height:46px;border-radius:50%;background:#1976D2;color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700;flex-shrink:0}
.fab{position:fixed;bottom:70px;right:16px;width:52px;height:52px;border-radius:50%;background:#1976D2;color:#fff;border:none;font-size:26px;box-shadow:0 3px 10px #0003;cursor:pointer;z-index:90}
#chat-box{display:flex;flex-direction:column;gap:4px;padding:10px;padding-bottom:80px;overflow-y:auto;min-height:calc(100vh - 130px)}
#chat-bar{position:fixed;bottom:58px;left:0;right:0;background:#fff;padding:8px;display:flex;gap:8px;border-top:1px solid #ddd;z-index:90}
#chat-input{flex:1;padding:10px 14px;border:1.5px solid #ddd;border-radius:20px;font-size:15px;outline:none}
#chat-send{background:#1976D2;color:#fff;border:none;border-radius:50%;width:40px;height:40px;font-size:18px;cursor:pointer;flex-shrink:0}
.msg-wrap{display:flex;flex-direction:column;margin:3px 10px}
.msg-wrap.mine{align-items:flex-end}
.msg-wrap.other{align-items:flex-start}
.msg{padding:8px 12px;border-radius:16px;max-width:75%;font-size:14px;word-break:break-word}
.msg.mine{background:#DCF8C6}
.msg.other{background:#fff;box-shadow:0 1px 2px #0001}
.msg-name{font-size:10px;color:#1976D2;font-weight:700;margin-bottom:2px}
.msg-time{font-size:9px;color:#999;margin-top:2px;text-align:right}
</style>
</head>
<body>

<div id="login" class="login">
  <div style="font-size:44px;text-align:center;margin-bottom:6px">📡</div>
  <h1>LocationShare</h1>
  <div class="sub">Family location & group chat</div>
  <div class="card">
    <h2 id="form-title">Sign In</h2>
    <div id="name-row" style="display:none">
      <label>Name</label>
      <input type="text" id="inp-name" placeholder="Your full name">
    </div>
    <label>Email</label>
    <input type="email" id="inp-email" placeholder="you@gmail.com" onchange="clearErr()">
    <label>Password</label>
    <input type="password" id="inp-pass" placeholder="Password" onkeyup="onPassKey(event)">
    <div class="info" id="info-msg">Fill email & password then press Enter or tap Sign In</div>
    <div class="err" id="err-msg"></div>
    <!-- Using a FORM so Enter key works and form submit works -->
    <form onsubmit="doAuth();return false;" style="margin:0">
      <button type="submit" class="btn" id="form-btn">Sign In</button>
    </form>
    <form onsubmit="toggleMode();return false;" style="margin:0">
      <button type="submit" class="link" id="toggle-btn">No account? Register</button>
    </form>
  </div>
</div>

<div id="app">
  <header>
    <h1 id="app-title">📡 LocationShare</h1>
    <button onclick="doSignOut()" style="background:none;border:1px solid #fff9;color:#fff;font-size:12px;padding:4px 10px;border-radius:8px;cursor:pointer">Out</button>
  </header>

  <div class="screen active" id="screen-groups">
    <div id="groups-list"><p style="color:#999;text-align:center;padding:30px">Loading...</p></div>
    <button class="fab" onclick="createGroup()">+</button>
  </div>

  <div class="screen" id="screen-chat" style="padding:0">
    <div id="chat-box"></div>
    <div id="chat-bar">
      <input type="text" id="chat-input" placeholder="Message..." onkeyup="if(event.key==='Enter')sendMsg()">
      <button id="chat-send" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <div class="screen" id="screen-map">
    <div style="text-align:center;padding:40px 20px">
      <div style="font-size:48px">🗺️</div>
      <h3 style="margin:12px 0 8px">Live Locations</h3>
      <p style="color:#666;font-size:14px;margin-bottom:20px">Select a group first, then tap members below to see their location</p>
      <div id="map-members"></div>
    </div>
  </div>

  <div class="screen" id="screen-profile">
    <div style="text-align:center;padding:30px 20px">
      <div style="width:70px;height:70px;border-radius:50%;background:#1976D2;color:#fff;font-size:28px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 12px" id="profile-avatar">U</div>
      <div style="font-size:18px;font-weight:700" id="profile-name">User</div>
      <div style="font-size:13px;color:#666;margin-top:4px" id="profile-email"></div>
    </div>
    <div style="background:#fff;margin:0 14px;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px #0001">
      <div style="padding:14px 16px;border-bottom:1px solid #eee">
        <span style="font-weight:600">📍 Location Sharing Active</span>
      </div>
      <div style="padding:14px 16px;cursor:pointer" onclick="joinGroup()">
        <span style="font-weight:600">🔑 Join Group by Code</span>
        <span style="float:right;color:#999">›</span>
      </div>
    </div>
    <div style="padding:16px 14px">
      <button onclick="doSignOut()" style="width:100%;background:#d32f2f;color:#fff;border:none;border-radius:10px;padding:14px;font-size:15px;font-weight:700;cursor:pointer">Sign Out</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab active" onclick="showScreen('groups',this)"><span>👥</span>Groups</button>
    <button class="tab" onclick="showScreen('chat',this)"><span>💬</span>Chat</button>
    <button class="tab" onclick="showScreen('map',this)"><span>🗺️</span>Map</button>
    <button class="tab" onclick="showScreen('profile',this)"><span>👤</span>Profile</button>
  </div>
</div>
